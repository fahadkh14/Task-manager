version: "3.9"

services:

  mysql:
    image: mysql:8.4
    container_name: task-manager-mysql
    restart: always

    env_file:
      - .env

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}

    ports:
      - "3306:3306"

    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

    networks:
      - task-network

  backend:
    build:
      context: ./backend

    container_name: task-manager-backend

    restart: always

    env_file:
      - .env

    depends_on:
      - mysql
        #  condition: service_healthy

    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}

    ports:
      - "5000:5000"

    networks:
      - task-network

  frontend:
    build:
      context: ./frontend

    container_name: task-manager-frontend

    restart: always

    depends_on:
      - backend

    ports:
      - "8080:80"

    networks:
      - task-network

volumes:
  mysql-data:

networks:
  task-network:
