apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend-task-deployment
  namespace: task
  labels:
    app: backend-task

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend-task

  template:
    metadata:
      labels:
        app: backend-task

    spec:
      containers:
      - name: backend-task

        image: task-manager-backend:latest
        imagePullPolicy: Never

        ports:
        - containerPort: 5000

        env:
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: DB_HOST

        - name: DB_PORT
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: DB_PORT

        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: DB_NAME

        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: DB_USER

        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: DB_PASSWORD
